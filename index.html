<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MailSorter AI</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>*{box-sizing:border-box;margin:0;padding:0}</style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
const SAMPLE_EMAILS=[{id:1,from:"billing@amazon.co.jp",subject:"ご注文の確認 #112-3456789",body:"ご注文いただきありがとうございます。商品の発送準備が整いました。配送予定日は明日です。合計金額: ¥12,800",date:"10:32"},{id:2,from:"team@github.com",subject:"[GitHub] Pull request review requested",body:"田中さんがあなたのレビューをリクエストしました。リポジトリ: myproject/backend PR #245: Fix auth token expiration bug",date:"09:15"},{id:3,from:"newsletter@techcrunch.com",subject:"今週のテックニュース: AIスタートアップ資金調達ラッシュ",body:"今週のハイライト: OpenAIが新モデルを発表、Anthropicが新たな研究を公開、日本のAIスタートアップが50億円調達...",date:"08:00"},{id:4,from:"hr@mycompany.com",subject:"【重要】来月の健康診断のご案内",body:"来月15日に社内健康診断を実施します。予約フォームへの記入をお願いします。締め切りは今月末です。",date:"昨日"},{id:5,from:"support@notion.so",subject:"Notionの新機能をご紹介",body:"AIアシスタント機能がアップデートされました。データベースの自動入力、ページ要約など新しい機能を試してみてください。",date:"昨日"},{id:6,from:"noreply@freee.co.jp",subject:"【freee】確定申告の準備を始めましょう",body:"確定申告シーズンが近づいています。freeeで簡単に申告書類を作成できます。今すぐ始める→",date:"月曜日"},{id:7,from:"alice@friend.com",subject:"今週末のハイキング、行ける？",body:"こんにちは！今週末に高尾山にハイキングに行こうと思ってるんだけど、一緒にどう？お昼ご飯持参で！",date:"月曜日"}];
const LABEL_CONFIG=[{id:"shopping",name:"ショッピング",color:"#f59e0b",bg:"#fef3c7",icon:"🛍️"},{id:"work",name:"仕事",color:"#3b82f6",bg:"#dbeafe",icon:"💼"},{id:"newsletter",name:"ニュースレター",color:"#8b5cf6",bg:"#ede9fe",icon:"📰"},{id:"finance",name:"お金・税金",color:"#10b981",bg:"#d1fae5",icon:"💰"},{id:"personal",name:"プライベート",color:"#ec4899",bg:"#fce7f3",icon:"👤"},{id:"notification",name:"通知",color:"#6b7280",bg:"#f3f4f6",icon:"🔔"}];

function App(){
  const[emails,setEmails]=React.useState(SAMPLE_EMAILS.map(e=>({...e,label:null,sorting:false,sorted:false})));
  const[selectedEmail,setSelectedEmail]=React.useState(null);
  const[isAutoSorting,setIsAutoSorting]=React.useState(false);
  const[sortedCount,setSortedCount]=React.useState(0);
  const[activeLabel,setActiveLabel]=React.useState("all");
  const[log,setLog]=React.useState([]);
  const getLabelById=id=>LABEL_CONFIG.find(l=>l.id===id);
  const addLog=msg=>setLog(prev=>[{msg,time:new Date().toLocaleTimeString("ja-JP",{hour:"2-digit",minute:"2-digit",second:"2-digit"})},...prev].slice(0,20));
  const classifyEmail=async email=>{
    const prompt=`以下のメールを分析して最も適切なラベルを1つだけ返してください。\nラベル: shopping(ショッピング) work(仕事) newsletter(ニュースレター) finance(お金・税金) personal(プライベート) notification(通知)\n送信者:${email.from}\n件名:${email.subject}\n本文:${email.body}\nラベルIDのみ返してください。`;
    const res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:50,messages:[{role:"user",content:prompt}]})});
    const data=await res.json();
    const text=data.content?.[0]?.text?.trim().toLowerCase()||"notification";
    return LABEL_CONFIG.map(l=>l.id).includes(text)?text:"notification";
  };
  const sortAll=async()=>{
    setIsAutoSorting(true);setLog([]);
    const unsorted=emails.filter(e=>!e.sorted);
    addLog(`🚀 ${unsorted.length}件のメールを分類開始...`);
    for(const email of unsorted){
      setEmails(prev=>prev.map(e=>e.id===email.id?{...e,sorting:true}:e));
      addLog(`📧 "${email.subject.slice(0,20)}..." を分析中`);
      try{
        const label=await classifyEmail(email);
        const lbl=getLabelById(label);
        setEmails(prev=>prev.map(e=>e.id===email.id?{...e,label,sorting:false,sorted:true}:e));
        setSortedCount(c=>c+1);
        addLog(`✅ → ${lbl?.icon} ${lbl?.name}`);
      }catch{
        setEmails(prev=>prev.map(e=>e.id===email.id?{...e,label:"notification",sorting:false,sorted:true}:e));
        addLog(`⚠️ 分類失敗`);
      }
      await new Promise(r=>setTimeout(r,400));
    }
    addLog("🎉 すべて完了！");setIsAutoSorting(false);
  };
  const reset=()=>{setEmails(SAMPLE_EMAILS.map(e=>({...e,label:null,sorting:false,sorted:false})));setSortedCount(0);setLog([]);setSelectedEmail(null);};
  const filteredEmails=activeLabel==="all"?emails:emails.filter(e=>e.label===activeLabel);
  const labelCounts=LABEL_CONFIG.reduce((acc,l)=>{acc[l.id]=emails.filter(e=>e.label===l.id).length;return acc;},{});

  return(
    <div style={{fontFamily:"'Hiragino Kaku Gothic ProN',sans-serif",background:"#0f0f13",minHeight:"100vh",color:"#e8e8f0",display:"flex",flexDirection:"column"}}>
      <header style={{background:"#13131a",borderBottom:"1px solid #2a2a3a",padding:"14px 20px",display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:8}}>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <div style={{width:34,height:34,borderRadius:10,background:"linear-gradient(135deg,#6366f1,#8b5cf6)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:16}}>✉️</div>
          <div>
            <div style={{fontSize:15,fontWeight:700,color:"#fff"}}>MailSorter AI</div>
            <div style={{fontSize:11,color:"#6b6b8a"}}>Claudeが自動でメールを振り分け</div>
          </div>
        </div>
        <div style={{display:"flex",gap:8,alignItems:"center"}}>
          <span style={{fontSize:12,color:"#6b6b8a"}}>{sortedCount}/{emails.length}件完了</span>
          <button onClick={reset} style={{background:"transparent",border:"1px solid #2a2a3a",color:"#9090b0",borderRadius:8,padding:"6px 12px",cursor:"pointer",fontSize:12}}>リセット</button>
          <button onClick={sortAll} disabled={isAutoSorting||emails.every(e=>e.sorted)} style={{background:isAutoSorting?"#2a2a3a":"linear-gradient(135deg,#6366f1,#8b5cf6)",border:"none",color:"#fff",borderRadius:10,padding:"8px 16px",cursor:isAutoSorting?"not-allowed":"pointer",fontSize:13,fontWeight:600}}>
            {isAutoSorting?"分類中...":"🤖 AI自動振り分け"}
          </button>
        </div>
      </header>
      <div style={{display:"flex",flex:1,overflow:"hidden",height:"calc(100vh - 65px)"}}>
        <aside style={{width:160,background:"#13131a",borderRight:"1px solid #2a2a3a",padding:"12px 8px",overflowY:"auto",flexShrink:0}}>
          {[{id:"all",name:"すべて",icon:"📬"},...LABEL_CONFIG].map(label=>(
            <div key={label.id} onClick={()=>setActiveLabel(label.id)} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"7px 8px",borderRadius:8,marginBottom:3,fontSize:12,cursor:"pointer",background:activeLabel===label.id?"#1e1e3a":"transparent",border:activeLabel===label.id?"1px solid #6366f1":"1px solid transparent",color:activeLabel===label.id?"#a5a8ff":"#8080a0"}}>
              <span>{label.icon} {label.name}</span>
              <span style={{fontSize:10,background:"#2a2a3a",padding:"1px 6px",borderRadius:10,color:"#6b6b8a"}}>{label.id==="all"?emails.length:(labelCounts[label.id]||0)}</span>
            </div>
          ))}
        </aside>
        <main style={{flex:1,overflowY:"auto",background:"#0f0f13"}}>
          {filteredEmails.map(email=>{
            const lbl=email.label?getLabelById(email.label):null;
            return(
              <div key={email.id} onClick={()=>setSelectedEmail(email.id===selectedEmail?null:email.id)} style={{padding:"12px 16px",borderBottom:"1px solid #1a1a24",cursor:"pointer",background:selectedEmail===email.id?"#1a1a28":"transparent",borderLeft:selectedEmail===email.id?"3px solid #6366f1":"3px solid transparent"}}>
                <div style={{display:"flex",gap:10,alignItems:"flex-start"}}>
                  <div style={{width:32,height:32,borderRadius:"50%",background:`hsl(${email.id*47},50%,30%)`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:13,flexShrink:0}}>{email.from[0].toUpperCase()}</div>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{display:"flex",justifyContent:"space-between",marginBottom:2}}>
                      <span style={{fontSize:12,fontWeight:600,color:"#d0d0e8",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{email.from}</span>
                      <span style={{fontSize:11,color:"#4a4a6a",flexShrink:0,marginLeft:8}}>{email.date}</span>
                    </div>
                    <div style={{fontSize:12,color:"#b0b0cc",marginBottom:4,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{email.subject}</div>
                    {email.sorting?<span style={{fontSize:11,color:"#6b6b8a"}}>分析中...</span>:lbl?<span style={{fontSize:11,padding:"2px 8px",borderRadius:20,background:lbl.bg,color:lbl.color,fontWeight:500}}>{lbl.icon} {lbl.name}</span>:<span style={{fontSize:11,color:"#3a3a5a"}}>未分類</span>}
                    {selectedEmail===email.id&&<div style={{marginTop:8,fontSize:12,color:"#8080a0",lineHeight:1.7,paddingTop:8,borderTop:"1px solid #2a2a3a"}}>{email.body}</div>}
                  </div>
                </div>
              </div>
            );
          })}
        </main>
        <aside style={{width:180,background:"#13131a",borderLeft:"1px solid #2a2a3a",padding:12,overflowY:"auto",flexShrink:0}}>
          <div style={{fontSize:10,color:"#6b6b8a",marginBottom:10,letterSpacing:1}}>ACTIVITY LOG</div>
          {log.length===0?<div style={{fontSize:11,color:"#3a3a5a",textAlign:"center",marginTop:20}}>AI振り分けを実行するとここにログが表示されます</div>:log.map((l,i)=>(
            <div key={i} style={{marginBottom:8,paddingBottom:8,borderBottom:"1px solid #1e1e2a"}}>
              <div style={{fontSize:11,color:"#c0c0d8",lineHeight:1.5}}>{l.msg}</div>
              <div style={{fontSize:10,color:"#4a4a6a",marginTop:2}}>{l.time}</div>
            </div>
          ))}
        </aside>
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
  </script>
</body>
</html>
